server:
  port: ${SPRING_PORT:8080}

spring:
  application:
    name: backend-spring

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:scholarai}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  ai-service-url: ${AI_SERVICE_URL:http://localhost:8000}
  ai-service-token: ${AI_SERVICE_TOKEN}
  jwt:
    secret: ${JWT_SECRET}
    access-token-minutes: ${ACCESS_TOKEN_MINUTES}
    refresh-token-days: ${REFRESH_TOKEN_DAYS}
  upload-dir: ${UPLOAD_DIR:../storage/uploads}
